<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Perfil Privado</title>
</head>
<body>
    <h2>Panel de Usuario</h2>
    <div id="loading">Cargando datos del usuario...</div>
    
    <!-- Este bloque estará oculto hasta confirmar que el usuario inició sesión -->
    <div id="content" style="display: none;">
        <p>¡Hola! Has ingresado correctamente a la zona privada.</p>
        <p><strong>Tu correo:</strong> <span id="userEmail"></span></p>
        <p><strong>Tu ID único (UID):</strong> <span id="userUid"></span></p>
        <button id="logoutBtn">Cerrar Sesión</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://gstatic.com";
        import { getAuth, onAuthStateChanged, signOut } from "https://gstatic.com";

        const firebaseConfig = {
          apiKey: "AIzaSyBHPl53nlowROldN-IGbmECGYhz3lRz7Tc",
          authDomain: "://firebaseapp.com",
          projectId: "night-f23fa",
          storageBucket: "night-f23fa.firebasestorage.app",
          messagingSenderId: "386862893155",
          appId: "1:386862893155:web:a42673375ea87209389056",
          measurementId: "G-ZSF58H9VE4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Guardián de ruta: Verifica en tiempo real si el usuario está autenticado
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Usuario autenticado: Mostrar datos y ocultar el mensaje de carga
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                
                document.getElementById('userEmail').innerText = user.email;
                document.getElementById('userUid').innerText = user.uid;
            } else {
                // Usuario NO autenticado: Expulsar a la página de login (asumiendo que se llama index.html)
                alert("No tienes permiso. Por favor, inicia sesión primero.");
                window.location.href = "index.html"; 
            }
        });

        // Evento para Cerrar Sesión
        document.getElementById('logoutBtn').addEventListener('click', () => {
            signOut(auth)
                .then(() => {
                    alert("Sesión cerrada correctamente.");
                    window.location.href = "index.html";
                })
                .catch((error) => {
                    alert("Error al cerrar sesión.");
                });
        });
    </script>
</body>
</html>
