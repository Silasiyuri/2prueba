<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil 2NIGHT</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f4f9; display: flex; justify-content: center; }
        .container { max-width: 400px; width: 100%; padding: 25px; background: white; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        h2 { color: #111; margin-bottom: 10px; }
        p { color: #555; font-size: 16px; margin-bottom: 20px; }
        .user-email { font-weight: bold; color: #007bff; }
        .btn-logout { width: 100%; padding: 12px; background-color: #dc3545; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .btn-logout:hover { background-color: #c82333; }
        /* Pantalla de carga mientras verifica Firebase */
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f4f4f9; display: flex; justify-content: center; align-items: center; z-index: 1000; font-size: 18px; font-weight: bold; color: #333; }
    </style>
</head>
<body>

<!-- Pantalla de carga de seguridad -->
<div id="loading" class="loading-overlay">Verificando sesión segura...</div>
<div class="container">
    <h2>¡Bienvenido a 2NIGHT!</h2>
    <p>Has ingresado correctamente a tu panel oficial.</p>
    <p>Tu usuario es: <span id="userEmail" class="user-email">Cargando...</span></p>
    
    <button class="btn-logout" id="btnCerrarSesion">Cerrar Sesión</button>
</div>

<!-- Scripts Oficiales de Firebase (Versión de compatibilidad v8) -->
<script src="https://gstatic.com"></script>
<script src="https://gstatic.com"></script>

<script>
    // Configuración exacta de tu proyecto Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyCpgq6V2u0_SUry-XNcoTBd-3GzKpho2BM",
      authDomain: "://firebaseapp.com",
      projectId: "night-oficial",
      storageBucket: "night-oficial.firebasestorage.app",
      messagingSenderId: "1058509818023",
      appId: "1:1058509818023:web:98bdad36b5685a220b3382"
    };

    // Inicializar Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Guardián de Seguridad: Monitorea el estado del usuario en tiempo real
    auth.onAuthStateChanged(function(user) {
        const loadingScreen = document.getElementById('loading');
        
        if (user) {
            // El usuario es válido y está autenticado
            document.getElementById('userEmail').innerText = user.email;
            loadingScreen.style.display = 'none'; // Quitar pantalla de carga
        } else {
            // Intento de acceso ilegal o no autenticado: Expulsar al index
            window.location.href = "index.html"; // Cambia "index.html" si tu formulario de registro tiene otro nombre
        }
    });

    // Lógica para Cerrar Sesión de forma segura
    document.getElementById('btnCerrarSesion').addEventListener('click', function() {
        auth.signOut().then(function() {
            // Firebase limpia los tokens del navegador automáticamente al salir
            window.location.href = "index.html";
        }).catch(function(error) {
            alert("Error al cerrar sesión. Inténtalo de nuevo.");
            console.error(error);
        });
    });
</script>


    
</body>
</html>
