<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Perfil</title>
</head>
<body>
    <h2>Panel de Usuario Privado</h2>
    <p id="userEmail">Cargando usuario...</p>
    <button id="logoutBtn">Cerrar Sesión</button>

    <script type="module">
        import { initializeApp } from "https://gstatic.com";
        import { getAuth, onAuthStateChanged, signOut } from "https://gstatic.com";

        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "TU_AUTH_DOMAIN",
            projectId: "TU_PROJECT_ID",
            storageBucket: "TU_STORAGE_BUCKET",
            messagingSenderId: "TU_MESSAGING_SENDER_ID",
            appId: "TU_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Este método detecta automáticamente si hay una sesión activa en el dispositivo
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('userEmail').innerText = "Conectado como: " + user.email;
            } else {
                // Si no está conectado, lo manda a loguearse
                window.location.href = "login.html";
            }
        });

        // Botón para cerrar sesión
        document.getElementById('logoutBtn').addEventListener('click', () => {
            signOut(auth).then(() => {
                window.location.href = "login.html";
            });
        });
    </script>
</body>
</html>
