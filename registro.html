<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse</title>
    <!-- Librerías estables de Firebase v8 -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
</head>
<body>
    <h2>Crear Cuenta Nueva</h2>
    <form id="registerForm">
        <input type="email" id="email" placeholder="Correo Electrónico" required><br><br>
        <input type="password" id="password" placeholder="Contraseña (mínimo 6 caracteres)" required><br><br>
        <button type="submit" id="btnRegistrar">Registrarme</button>
    </form>
    <br>
    <p>¿Ya tienes cuenta? <a href="index.html">Inicia sesión aquí</a></p>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyBHPl53nlowROldN-IGbmECGYhz3lRz7Tc",
          authDomain: "://firebaseapp.com",
          projectId: "night-f23fa",
          storageBucket: "night-f23fa.firebasestorage.app",
          messagingSenderId: "386862893155",
          appId: "1:386862893155:web:a42673375ea87209389056",
          measurementId: "G-ZSF58H9VE4"
        };

        // Inicializar Firebase básico
        firebase.initializeApp(firebaseConfig);

        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const boton = document.getElementById('btnRegistrar');
            boton.innerText = "Enviando datos...";
            boton.disabled = true;

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            firebase.auth().createUserWithEmailAndPassword(email, password)
                .then(function(userCredential) {
                    alert("¡ÉXITO! Tu usuario ha sido guardado.");
                    window.location.href = "perfil.html";
                })
                .catch(function(error) {
                    boton.innerText = "Registrarme";
                    boton.disabled = false;
                    // Alerta que te dirá el error real si tu panel sigue bloqueado
                    alert("Error detectado: " + error.message);
                    console.error(error);
                });
        });
    </script>
</body>
</html>
