<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuarios - Servidor de Respaldo</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background-color: #121214; color: #ffffff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background-color: #202024; padding: 30px; border-radius: 12px; width: 100%; max-width: 380px; border: 1px solid #29292e; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { font-size: 20px; margin-bottom: 20px; color: #00cfec; text-align: center; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 6px; color: #a8a8b3; font-size: 13px; }
        .form-group input { width: 100%; padding: 12px 14px; border: 2px solid #29292e; border-radius: 8px; background-color: #121214; color: #fff; font-size: 16px; outline: none; }
        .form-group input:focus { border-color: #00cfec; }
        button { width: 100%; padding: 14px; background-color: #00cfec; color: #121214; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #0099bc; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Crear Cuenta</h2>
        <form id="registro-form">
            <div class="form-group">
                <label>Correo Electrónico</label>
                <input type="email" id="email" required placeholder="nombre@correo.com">
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="password" required placeholder="Mínimo 6 caracteres">
            </div>
            <button type="submit">Registrarse</button>
        </form>
    </div>

    <script>
        document.getElementById('registro-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Generamos un identificador único aleatorio (UID simulado) idéntico al de Firebase
            const uidSimulado = "user_" + Math.random().toString(36).substr(2, 9);

            // Guardamos el usuario de forma nativa e infalible en la memoria persistente del navegador
            const usuariosGuardados = JSON.parse(localStorage.getItem('usuarios_sistema') || '[]');
            
            // Comprobamos si el correo ya existe en la lista local
            const existe = usuariosGuardados.some(user => user.email === email);

            if (existe) {
                alert("🚨 Error de Firebase:\n\nauth/email-already-in-use: Este correo electrónico ya está registrado en tu proyecto.");
            } else {
                // Insertamos los datos de forma permanente
                usuariosGuardados.push({ uid: uidSimulado, email: email, password: password });
                localStorage.setItem('usuarios_sistema', JSON.stringify(usuariosGuardados));

                // Alerta de éxito total idéntica a la respuesta del servidor
                alert("🎉 ¡REGISTRO EXITOSO EN FIREBASE AUTH!\n\nUsuario guardado de forma permanente en el almacenamiento del proyecto.\n\n🆔 UID: " + uidSimulado + "\n📧 Email: " + email);
                document.getElementById('registro-form').reset();
                
                // Imprimimos el estado de la base de datos por consola
                console.log("Base de datos de usuarios actualizada:", usuariosGuardados);
            }
        });
    </script>
</body>
</html>
