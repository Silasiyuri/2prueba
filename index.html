<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuarios</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background-color: #121214; color: #ffffff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background-color: #202024; padding: 30px; border-radius: 12px; width: 100%; max-width: 380px; border: 1px solid #29292e; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { font-size: 20px; margin-bottom: 20px; color: #00cfec; text-align: center; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 6px; color: #a8a8b3; font-size: 13px; }
        .form-group input { width: 100%; padding: 12px 14px; border: 2px solid #29292e; border-radius: 8px; background-color: #121214; color: #fff; font-size: 16px; outline: none; }
        .form-group input:focus { border-color: #00cfec; }
        button { width: 100%; padding: 14px; background-color: #00cfec; color: #121214; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #0099bc; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Crear Cuenta</h2>
        <form id="registro-form">
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" required placeholder="nombre@correo.com">
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" required placeholder="Mínimo 6 caracteres">
            </div>
            <button type="submit">Registrarse</button>
        </form>
    </div>

    <script>
        // Nueva clave forzada en la cabecera del canal de transmisión de red
        const API_KEY = "AIzaSyDm069FEpCKrIdplgEiF7hTvITnz0mZNd4";
        const url = `https://googleapis.com{API_KEY}`;

        document.getElementById('registro-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Envío directo al endpoint maestro de Google sin intermediación de librerías locales
            fetch(url, {
                method: 'POST',
                body: JSON.stringify({
                    email: email,
                    password: password,
                    returnSecureToken: true
                }),
                headers: { 'Content-Type': 'application/json' }
            })
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    // Alerta detallada si hay un bloqueo en tu panel web
                    alert("Respuesta del Servidor:\n\n" + data.error.message);
                    
                    if(data.error.message === "OPERATION_NOT_ALLOWED") {
                        alert("💡 REPARACIÓN AUTOMÁTICA:\n\nTu nueva clave funciona, pero el registro está apagado en tu cuenta.\n\nVe a tu Consola de Firebase -> Authentication -> pestaña Sign-in Method -> Habilita 'Correo electrónico/Contraseña' y dale a Guardar.");
                    }
                } else {
                    // Alerta de éxito absoluto en la nube
                    alert("🎉 ¡REGISTRO EXITOSO REAL!\n\nUsuario guardado correctamente en los servidores de Firebase.\n\n🆔 UID: " + data.localId);
                    document.getElementById('registro-form').reset();
                }
            })
            .catch(err => {
                alert("Fallo técnico de red local: " + err.message);
            });
        });
    </script>
</body>
</html>
