<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro 2NIGHT</title>
    <!-- Cargamos las librerías oficiales de Firebase para saltar el bloqueo del navegador -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
</head>
<body>
    <h2>Crear Cuenta Nueva (2NIGHT)</h2>
    <form id="registerForm">
        <input type="email" id="email" placeholder="Correo Electrónico" required><br><br>
        <input type="password" id="password" placeholder="Contraseña (mínimo 6 caracteres)" required><br><br>
        <button type="submit" id="btnRegistrar">Registrarme</button>
    </form>
    
    <script>
        // Tu clave de API e inicialización del proyecto 2NIGHT
        const firebaseConfig = {
          apiKey: "AIzaSyBHPl53nlowROldN-IGbmECGYhz3lRz7Tc",
          authDomain: "://firebaseapp.com", // El subdominio nativo asignado por Google Cloud
          projectId: "2night-auth"
        };

        // Inicializar el SDK nativo
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const boton = document.getElementById('btnRegistrar');
            boton.innerText = "Registrando en la nube de 2NIGHT...";
            boton.disabled = true;

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Función interna de Google que el navegador permite ejecutar de forma segura
            firebase.auth().createUserWithEmailAndPassword(email, password)
                .then(function(userCredential) {
                    alert("¡ÉXITO COMPLETO! Tu usuario se ha registrado en la consola 2NIGHT.");
                    window.location.href = "perfil.html";
                })
                .catch(function(error) {
                    boton.innerText = "Registrarme";
                    boton.disabled = false;
                    // Alerta interna de diagnóstico directo de Firebase
                    alert("Firebase respondió: " + error.message);
                });
        });
    </script>
</body>
</html>
