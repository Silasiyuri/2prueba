<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Sistema de Registro - Firebase</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background-color: #0f172a; color: #f8fafc; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background-color: #1e293b; padding: 32px; border-radius: 16px; width: 100%; max-width: 400px; border: 1px solid #334155; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3); }
        h2 { font-size: 22px; margin-bottom: 24px; color: #38bdf8; text-align: center; font-weight: 700; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #94a3b8; font-size: 14px; font-weight: 500; }
        .form-group input { width: 100%; padding: 12px 16px; border: 2px solid #334155; border-radius: 8px; background-color: #0f172a; color: #fff; font-size: 16px; outline: none; transition: border-color 0.2s; }
        .form-group input:focus { border-color: #38bdf8; }
        button { width: 100%; padding: 14px; background-color: #38bdf8; color: #0f172a; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; transition: background-color 0.2s; }
        button:hover { background-color: #0ea5e9; }
        .msg { margin-top: 20px; font-size: 14px; text-align: center; display: none; padding: 12px; border-radius: 8px; font-weight: 500; }
        .success { display: block; background-color: rgba(34, 197, 94, 0.15); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.3); }
        .error { display: block; background-color: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); }
    </style>

    <!-- Cargamos las librerías tradicionales de Firebase (Compat/v8) que no fallan en servidores estáticos -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
</head>
<body>

    <div class="card">
        <h2>Registro desde Cero</h2>
        
        <form id="authForm">
            <div class="form-group">
                <label>Correo Electrónico</label>
                <input type="email" id="email" required placeholder="ejemplo@correo.com">
            </div>
            
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="password" required placeholder="Mínimo 6 caracteres">
            </div>
            
            <button type="submit" id="btnSubmit">Crear Cuenta</button>
        </form>

        <div id="statusMessage" class="msg"></div>
    </div>

    <script>
        // Tus credenciales del proyecto 'mi-sistema-registro' incorporadas directamente
        var firebaseConfig = {
          apiKey: "AIzaSyA4qsD-4W9x9gR0SEqASQm5RiUVbf0vXPw",
          authDomain: "://firebaseapp.com",
          projectId: "mi-sistema-registro",
          storageBucket: "mi-sistema-registro.firebasestorage.app",
          messagingSenderId: "109741039736",
          appId: "1:109741039736:web:d3f35f3b2700e797bccd8d"
        };

        // Inicializar Firebase de forma global clásica
        firebase.initializeApp(firebaseConfig);

        var form = document.getElementById('authForm');
        var statusMessage = document.getElementById('statusMessage');
        var button = document.getElementById('btnSubmit');

        form.addEventListener('submit', function(e) {
            e.preventDefault();

            var email = document.getElementById('email').value;
            var password = document.getElementById('password').value;

            // Limpiar estados visuales e inactivar botón momentáneamente
            statusMessage.className = "msg";
            statusMessage.style.display = "none";
            button.disabled = true;
            button.textContent = "Procesando...";

            // Llamada directa al servicio de autenticación
            firebase.auth().createUserWithEmailAndPassword(email, password)
                .then(function(userCredential) {
                    var user = userCredential.user;
                    statusMessage.textContent = "¡Excelente! Cuenta creada en la nube de Firebase.";
                    statusMessage.className = "msg success";
                    form.reset();
                    button.disabled = false;
                    button.textContent = "Crear Cuenta";
                })
                .catch(function(error) {
                    console.error("Error completo enviado por Google:", error);
                    var userFriendlyText = "Ocurrió un problema inesperado.";

                    if (error.code === 'auth/email-already-in-use') {
                        userFriendlyText = "Este correo ya está registrado en tu proyecto.";
                    } else if (error.code === 'auth/weak-password') {
                        userFriendlyText = "La contraseña requiere un mínimo de 6 caracteres.";
                    } else if (error.code === 'auth/invalid-email') {
                        userFriendlyText = "El formato de correo no es válido.";
                    } else if (error.code === 'auth/operation-not-allowed') {
                        userFriendlyText = "Error: Falta habilitar 'Correo/contraseña' en la pestaña Sign-in Method dentro de Firebase.";
                    } else if (error.code === 'auth/unauthorized-domain') {
                        userFriendlyText = "Error: Debes agregar tu enlace de GitHub en la sección 'Dominios autorizados' de Firebase.";
                    } else {
                        userFriendlyText = "Error del servidor: " + error.message;
                    }

                    statusMessage.textContent = userFriendlyText;
                    statusMessage.className = "msg error";
                    button.disabled = false;
                    button.textContent = "Crear Cuenta";
                });
        });
    </script>
</body>
</html>
