<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Oficial 2NIGHT</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }
        form {
            max-width: 300px;
        }
        input {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:disabled {
            background-color: #cccccc;
        }
    </style>
</head>
<body>
    <h2>Crear Cuenta Nueva (2NIGHT)</h2>
    <form id="registerForm">
        <input type="email" id="email" placeholder="Correo Electrónico" required><br>
        <input type="password" id="password" placeholder="Contraseña (mínimo 6 caracteres)" required><br>
        <button type="submit" id="btnRegistrar">Registrarme</button>
    </form>
    
    <script type="module">
        // 1. RUTAS COMPLETAS: Direcciones web oficiales hacia los archivos JavaScript de Firebase
        import { initializeApp } from "https://gstatic.com";
        import { getAuth, createUserWithEmailAndPassword } from "https://gstatic.com";

        // 2. CONFIGURACIÓN REPARADA: Conexión directa con tu base de datos de 2NIGHT
        const firebaseConfig = {
          apiKey: "AIzaSyBHPl53nlowROldN-IGbmECGYhz3lRz7Tc",
          authDomain: "night-f23fa.firebaseapp.com",
          projectId: "night-f23fa"
        };

        // Inicializar la aplicación
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Controlar el formulario de la página
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const boton = document.getElementById('btnRegistrar');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Bloquear el botón para evitar clics repetidos
            boton.innerText = "Registrando en 2NIGHT...";
            boton.disabled = true;

            // Enviar datos a Firebase Authentication
            createUserWithEmailAndPassword(auth, email, password)
                .then(function(userCredential) {
                    alert("¡ÉXITO TOTAL! El usuario se guardó en tu panel de 2NIGHT.");
                    window.location.href = "perfil.html";
                })
                .catch(function(error) {
                    // Si el servidor responde con un error, se reactiva el formulario
                    boton.innerText = "Registrarme";
                    boton.disabled = false;
                    
                    // Alerta que muestra el motivo exacto del fallo
                    alert("Respuesta de Firebase: " + error.message);
                    
                    console.error("Código de error:", error.code);
                    console.error("Mensaje completo:", error.message);
                });
        });
    </script>
</body>
</html>
