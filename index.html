<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuarios</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background-color: #121214; color: #ffffff; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; }
        .card { background-color: #202024; padding: 30px; border-radius: 12px; width: 100%; max-width: 380px; border: 1px solid #29292e; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { font-size: 20px; margin-bottom: 20px; color: #00cfec; text-align: center; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 6px; color: #a8a8b3; font-size: 13px; }
        .form-group input { width: 100%; padding: 12px 14px; border: 2px solid #29292e; border-radius: 8px; background-color: #121214; color: #fff; font-size: 16px; outline: none; }
        .form-group input:focus { border-color: #00cfec; }
        button { width: 100%; padding: 14px; background-color: #00cfec; color: #121214; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #0099bc; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Crear Cuenta</h2>
        <form id="registro-form">
            <div class="form-group">
                <label>Correo Electrónico</label>
                <input type="email" id="email" required placeholder="nombre@correo.com">
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="password" required placeholder="Mínimo 6 caracteres">
            </div>
            <button type="submit">Registrarse</button>
        </form>
    </div>

    <script>
        // Tu API Key exacta para la prueba
        const API_KEY = "AIzaSyAzBa3rUUKQ6rlmtmbrqdZN3lWulBBbLG0";

        document.getElementById('registro-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // URL del servidor central de Google Identity para crear usuarios
            const url = `https://googleapis.com{API_KEY}`;

            // Petición nativa directa sin usar librerías propensas a errores
            fetch(url, {
                method: 'POST',
                body: JSON.stringify({
                    email: email,
                    password: password,
                    returnSecureToken: true
                }),
                headers: { 'Content-Type': 'application/json' }
            })
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    // Si el servidor de Google rechaza la petición, te avisa el motivo
                    alert("Respuesta de Firebase:\n\n" + data.error.message);
                } else {
                    // Si el registro se completa con éxito
                    alert("🎉 ¡USUARIO REGISTRADO CON ÉXITO!\n\nID único creado: " + data.localId);
                    document.getElementById('registro-form').reset();
                }
            })
            .catch(err => {
                alert("Error de conexión local: Tu navegador o tu red están bloqueando la salida de datos.");
            });
        });
    </script>
</body>
</html>
