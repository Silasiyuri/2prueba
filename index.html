<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Directo Seguro</title>
</head>
<body>
    <h2>Crear Cuenta Nueva</h2>
    <form id="registerForm">
        <input type="email" id="email" placeholder="Correo Electrónico" required><br><br>
        <input type="password" id="password" placeholder="Contraseña (mínimo 6 caracteres)" required><br><br>
        <button type="submit" id="btnRegistrar">Registrarme</button>
    </form>
    
 <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const boton = document.getElementById('btnRegistrar');
            boton.innerText = "Conectando de forma segura...";
            boton.disabled = true;

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // URL CORREGIDA: Incluye https:// obligatorio para que no lo bloquee el celular
            const url = "https://googleapis.com";

            fetch(url, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ 
                    email: email, 
                    password: password, 
                    returnSecureToken: true 
                })
            })
            .then(function(response) {
                return response.json();
            })
            .then(function(data) {
                if (data.error) {
                    // Si Firebase detecta un problema con el correo o contraseña, lo avisa aquí
                    alert("Firebase denegó el registro: " + data.error.message);
                    boton.innerText = "Registrarme";
                    boton.disabled = false;
                } else {
                    // Registro exitoso en la nube
                    alert("¡ÉXITO TOTAL! Tu usuario se ha registrado en Firebase.");
                    window.location.href = "perfil.html";
                }
            })
            .catch(function(error) {
                // Alerta en caso de que un bloqueador de anuncios interfiera en la red
                alert("Error de conexión: " + error.message);
                boton.innerText = "Registrarme";
                boton.disabled = false;
            });
        });
    </script>
</body>
</html>
