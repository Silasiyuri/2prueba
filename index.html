<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Directo</title>
</head>
<body>
    <h2>Crear Cuenta Nueva</h2>
    <form id="registerForm">
        <input type="email" id="email" placeholder="Correo Electrónico" required><br><br>
        <input type="password" id="password" placeholder="Contraseña (mínimo 6 caracteres)" required><br><br>
        <button type="submit" id="btnRegistrar">Registrarme</button>
    </form>
    
 <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const boton = document.getElementById('btnRegistrar');
            boton.innerText = "Conectando...";
            boton.disabled = true;

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Petición directa a la API de Firebase
            const url = "https://googleapis.com";

            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, password: password, returnSecureToken: true })
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    alert("Firebase denegó el registro: " + data.error.message);
                    boton.innerText = "Registrarme";
                    boton.disabled = false;
                } else {
                    alert("¡ÉXITO! El usuario se ha guardado en tu panel.");
                    window.location.href = "perfil.html";
                }
            })
            .catch(error => {
                alert("Error de conexión: " + error.message);
                boton.innerText = "Registrarme";
                boton.disabled = false;
            });
        });
    </script>
</body>
</html>
