<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Seguro - Supabase</title>
    
    <!-- Cargamos la SDK oficial de Supabase -->
    <script src="https://jsdelivr.net"></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background-color: #0f172a; color: #f8fafc; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background-color: #1e293b; padding: 32px; border-radius: 16px; width: 100%; max-width: 400px; border: 1px solid #334155; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3); }
        h2 { font-size: 22px; margin-bottom: 24px; color: #10b981; text-align: center; font-weight: 700; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #94a3b8; font-size: 14px; font-weight: 500; }
        .form-group input { width: 100%; padding: 12px 16px; border: 2px solid #334155; border-radius: 8px; background-color: #0f172a; color: #fff; font-size: 16px; outline: none; transition: border-color 0.2s; }
        .form-group input:focus { border-color: #10b981; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        button { flex: 1; padding: 14px; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; font-weight: bold; transition: background-color 0.2s; }
        .btn-primary { background-color: #10b981; color: #0f172a; }
        .btn-primary:hover { background-color: #059669; }
        .btn-secondary { background-color: #334155; color: #f8fafc; }
        .btn-secondary:hover { background-color: #475569; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* El mensaje de estado ahora inicia visible avisando al usuario */
        .msg { margin-top: 20px; font-size: 14px; text-align: center; display: block; padding: 12px; border-radius: 8px; font-weight: 500; white-space: pre-wrap; word-break: break-word; }
        .cargando { background-color: rgba(148, 163, 184, 0.15); color: #94a3b8; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Ingreso a la Nube</h2>
        <div id="authForm">
            <div class="form-group">
                <label>Correo Electrónico</label>
                <input type="email" id="email" required placeholder="ejemplo@correo.com">
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="password" required minlength="6" placeholder="Mínimo 6 caracteres">
            </div>
            <div class="btn-group">
                <!-- Iniciamos los botones desactivados por seguridad -->
                <button type="button" id="btnLogin" class="btn-primary" disabled onclick="ejecutarAcceso('login')">Iniciar Sesión</button>
                <button type="button" id="btnRegister" class="btn-secondary" disabled onclick="ejecutarAcceso('registro')">Registrarse</button>
            </div>
        </div>
        <div id="statusMessage" class="msg cargando">Conectando con la librería de seguridad...</div>
    </div>

    <script>
        const statusMessage = document.getElementById('statusMessage');
        const btnLogin = document.getElementById('btnLogin');
        const btnRegister = document.getElementById('btnRegister');

        // Control de espera: Habilitamos botones solo cuando la librería de internet esté lista
        window.addEventListener('load', () => {
            // Verificamos si el objeto 'supabase' ya fue inyectado por la CDN externa
            if (typeof supabase !== 'undefined') {
                btnLogin.disabled = false;
                btnRegister.disabled = false;
                statusMessage.style.display = "none"; // Ocultamos el aviso de carga inicial
            } else {
                statusMessage.textContent = "Error: La librería externa de Supabase fue bloqueada por tu red.";
                statusMessage.style.backgroundColor = "rgba(239, 68, 68, 0.15)";
                statusMessage.style.color = "#f87171";
            }
        });

        async function ejecutarAcceso(modo) {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                alert("Por favor, rellena todos los campos.");
                return;
            }

            statusMessage.style.display = "block";
            statusMessage.className = "msg cargando";
            statusMessage.textContent = "Procesando...";
            
            btnLogin.disabled = true;
            btnRegister.disabled = true;

            try {
                const plataformaBase = "https://supabase.co"; 
                const llavePublica = "sb_publishable_R0Cjm2izOTXxcgF-m5METQ_EOahA7iyesta";
                
                // Creación de cliente garantizada bajo el evento verificado
                const instanciaInstatanea = supabase.createClient(plataformaBase, llavePublica);

                let peticion;
                if (modo === 'registro') {
                    peticion = await instanciaInstatanea.auth.signUp({ email, password });
                } else {
                    peticion = await instanciaInstatanea.auth.signInWithPassword({ email, password });
                }

                const { data, error } = peticion;

                btnLogin.disabled = false;
                btnRegister.disabled = false;

                if (error) {
                    statusMessage.textContent = "Error de Supabase: " + error.message;
                    statusMessage.style.backgroundColor = "rgba(239, 68, 68, 0.15)";
                    statusMessage.style.color = "#f87171";
                } else {
                    statusMessage.textContent = modo === 'registro' 
                        ? "¡Éxito absoluto! Cuenta creada en Supabase." 
                        : "¡Login correcto! Bienvenido.";
                    statusMessage.style.backgroundColor = "rgba(16, 185, 129, 0.15)";
                    statusMessage.style.color = "#34d399";
                    document.getElementById('email').value = "";
                    document.getElementById('password').value = "";
                }
            } catch (err) {
                btnLogin.disabled = false;
                btnRegister.disabled = false;
                statusMessage.textContent = "Error de proceso interno: " + err.message;
                statusMessage.style.backgroundColor = "rgba(239, 68, 68, 0.15)";
                statusMessage.style.color = "#f87171";
            }
        }
    </script>
</body>
</html>
