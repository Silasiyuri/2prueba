<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Oficial 2NIGHT</title>
    <!-- SDK oficial de Firebase para evitar bloqueos del navegador -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
</head>
<body>
    <h2>Crear Cuenta Nueva (2NIGHT)</h2>
    <form id="registerForm">
        <input type="email" id="email" placeholder="Correo Electrónico" required><br><br>
        <input type="password" id="password" placeholder="Contraseña (mínimo 6 caracteres)" required><br><br>
        <button type="submit" id="btnRegistrar">Registrarme</button>
    </form>
    
    <script>
        // CONFIGURACIÓN CORREGIDA: Combina el ID real heredado de tu cuenta de servicio con el nuevo subdominio
        const firebaseConfig = {
          apiKey: "AIzaSyBHPl53nlowROldN-IGbmECGYhz3lRz7Tc",
          authDomain: "://firebaseapp.com", 
          projectId: "night-f23fa" 
        };

        // Inicializar de forma segura
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const boton = document.getElementById('btnRegistrar');
            boton.innerText = "Conectando con 2NIGHT...";
            boton.disabled = true;

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Petición directa a través del canal oficial del SDK
            firebase.auth().createUserWithEmailAndPassword(email, password)
                .then(function(userCredential) {
                    alert("¡ÉXITO TOTAL! Tu usuario se ha registrado en tu consola 2NIGHT.");
                    window.location.href = "perfil.html";
                })
                .catch(function(error) {
                    boton.innerText = "Registrarme";
                    boton.disabled = false;
                    alert("Firebase respondió: " + error.message);
                });
        });
    </script>
</body>
</html>
