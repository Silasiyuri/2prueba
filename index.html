<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Oficial 2NIGHT</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f4f9; display: flex; justify-content: center; }
        .container { max-width: 350px; width: 100%; padding: 25px; background: white; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; margin-bottom: 20px; color: #111; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }
        .alert-box { margin-top: 15px; padding: 12px; font-size: 14px; border-radius: 4px; display: none; text-align: center; font-weight: 500; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

<div class="container">
    <h2>Crear Cuenta (2NIGHT)</h2>
    <form id="registerForm">
        <input type="email" id="email" placeholder="Correo Electrónico" required>
        <input type="password" id="password" placeholder="Contraseña (mínimo 6 caracteres)" required>
        <button type="submit" id="btnRegistrar">Registrarme</button>
    </form>
    <div id="statusMessage" class="alert-box"></div>
</div>

<!-- Scripts Oficiales de Firebase (Versión de compatibilidad v8) -->
<script src="https://gstatic.com"></script>
<script src="https://gstatic.com"></script>

<script>
    // Configuración corregida de tu proyecto Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyCpgq6V2u0_SUry-XNcoTBd-3GzKpho2BM",
      authDomain: "://firebaseapp.com", // URL corregida
      projectId: "night-oficial",
      storageBucket: "night-oficial.firebasestorage.app",
      messagingSenderId: "1058509818023",
      appId: "1:1058509818023:web:98bdad36b5685a220b3382"
    };

    // Inicializar Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    document.getElementById('registerForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const boton = document.getElementById('btnRegistrar');
        const statusBox = document.getElementById('statusMessage');
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        // Estado de carga
        boton.innerText = "Registrando en 2NIGHT...";
        boton.disabled = true;
        statusBox.style.display = "none";

        // Petición real de creación de usuario en Firebase Auth
        auth.createUserWithEmailAndPassword(email, password)
            .then(function(userCredential) {
                // Registro exitoso
                mostrarAlerta(statusBox, "¡ÉXITO TOTAL! Registrado en tu panel night-oficial.", "success");
                setTimeout(() => { 
                    window.location.href = "perfil.html"; 
                }, 2000);
            })
            .catch(function(error) {
                // Manejo de errores reales de Firebase
                console.error("Error en el registro:", error);
                
                let mensajeError = "Ocurrió un error. Inténtalo de nuevo.";
                
                // Personalizar mensajes según el error de Firebase
                if (error.code === 'auth/email-already-in-use') {
                    mensajeError = "Este correo ya está registrado.";
                } else if (error.code === 'auth/weak-password') {
                    mensajeError = "La contraseña debe tener al menos 6 caracteres.";
                } else if (error.code === 'auth/invalid-email') {
                    mensajeError = "El formato del correo no es válido.";
                }

                mostrarAlerta(statusBox, mensajeError, "error");
                
                // Reactivar el botón para que el usuario pueda corregir los datos
                boton.innerText = "Registrarme";
                boton.disabled = false;
            });
    });

    function mostrarAlerta(elemento, mensaje, clase) {
        elemento.innerText = mensaje;
        elemento.className = "alert-box " + clase;
        elemento.style.display = "block";
    }
</script>

</body>
</html>
