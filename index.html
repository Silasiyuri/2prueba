<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta - Registro Directo</title>
</head>
<body>
    <h2>Crear Cuenta Nueva</h2>
    <form id="registerForm">
        <input type="email" id="email" placeholder="Correo Electrónico" required><br><br>
        <input type="password" id="password" placeholder="Contraseña (mínimo 6 caracteres)" required><br><br>
        <button type="submit" id="btnRegistrar">Registrarme</button>
    </form>
    
    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const boton = document.getElementById('btnRegistrar');
            boton.innerText = "Conectando directamente con el servidor...";
            boton.disabled = true;

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Tu API Key real del proyecto night-f23fa
            const apiKey = "AIzaSyBHPl53nlowROldN-IGbmECGYhz3lRz7Tc";
            
            // Endpoint nativo de la API de Google para crear usuarios en Firebase Auth
            const url = `https://googleapis.com{apiKey}`;

            // Petición directa HTTP para saltarse los bloqueos de librerías
            fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    email: email,
                    password: password,
                    returnSecureToken: true
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    // Si Firebase rechaza los datos, nos dirá el motivo exacto en una alerta
                    alert("Firebase rechazó la solicitud: " + data.error.message);
                    boton.innerText = "Registrarme";
                    boton.disabled = false;
                } else {
                    // Si todo es correcto, guardará al usuario en la consola
                    alert("¡ÉXITO ABSOLUTO! Usuario registrado directamente en la base de datos.");
                    console.log("Datos del usuario creado:", data);
                    
                    // Guarda el token en el navegador para mantener la sesión
                    localStorage.setItem('userToken', data.idToken);
                    
                    // Intenta redirigir (asegúrate de tener este archivo creado en tu GitHub)
                    window.location.href = "perfil.html";
                }
            })
            .catch(error => {
                alert("Error crítico de red/bloqueador: " + error.message);
                boton.innerText = "Registrarme";
                boton.disabled = false;
            });
        });
    </script>
</body>
</html>
