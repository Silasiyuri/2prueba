<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consola de Registro GitHub - Firebase</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #0c0c0e; color: #f5f5f7; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 30px; }
        h1 { font-size: 22px; margin-bottom: 5px; color: #fff; text-align: center; }
        .subtitle { font-size: 13px; color: #00ff66; margin-bottom: 25px; text-align: center; font-weight: bold; background: rgba(0,255,102,0.1); padding: 6px 12px; border-radius: 20px; border: 1px solid rgba(0,255,102,0.2); }
        .wrapper { display: flex; gap: 24px; width: 100%; max-width: 950px; flex-wrap: wrap; }
        .panel-form { background-color: #16161a; padding: 30px; border-radius: 12px; flex: 1; min-width: 320px; border: 1px solid #222227; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { font-size: 17px; margin-bottom: 20px; color: #00cfec; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 6px; color: #a1a1aa; font-size: 13px; font-weight: 500; }
        .form-group input { width: 100%; padding: 12px 14px; border: 2px solid #2d2d35; border-radius: 8px; background-color: #0c0c0e; color: #fff; font-size: 16px; transition: border-color 0.2s; }
        .form-group input:focus { border-color: #00cfec; outline: none; }
        button { width: 100%; padding: 14px; background-color: #00cfec; color: #0c0c0e; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: 700; }
        button:hover { background-color: #00a8c0; }
        .monitor { background-color: #000000; border: 1px solid #222227; border-radius: 12px; padding: 20px; flex: 1; min-width: 320px; max-height: 450px; overflow-y: auto; font-family: monospace; box-shadow: inset 0 0 15px rgba(0,0,0,0.9); }
        .monitor-title { color: #00ff66; border-bottom: 1px solid #222227; padding-bottom: 8px; margin-bottom: 12px; font-size: 11px; text-transform: uppercase; font-weight: bold; }
        .log-line { margin-bottom: 8px; font-size: 12px; line-height: 1.5; word-break: break-all; }
    </style>
</head>
<body>

    <h1>Servidor de Autenticación de Usuarios</h1>
    <div class="subtitle">🌐 Sincronizado con GitHub Pages & Nube de Google</div>

    <div class="wrapper">
        <!-- FORMULARIO -->
        <div class="panel-form">
            <h2>Crear Cuenta Nueva</h2>
            <form id="formulario-registro">
                <div class="form-group">
                    <label>Correo Electrónico</label>
                    <input type="email" id="correo-usuario" required placeholder="nombre@ejemplo.com">
                </div>
                <div class="form-group">
                    <label>Contraseña de Seguridad</label>
                    <input type="password" id="clave-usuario" required placeholder="Mínimo 6 caracteres" minlength="6">
                </div>
                <button type="submit">Guardar en Firebase</button>
            </form>
        </div>

        <!-- MONITOR DE INFORMACIÓN EN VIVO -->
        <div class="monitor">
            <div class="monitor-title">📋 HISTORIAL DE COMUNICACIÓN DE RED (EN VIVO)</div>
            <div id="pantalla-logs"></div>
        </div>
    </div>

    <script>
        const logsDiv = document.getElementById('pantalla-logs');
        const form = document.getElementById('formulario-registro');

        function registrarLog(mensaje, color = '#f5f5f7') {
            const tiempo = new Date().toLocaleTimeString();
            logsDiv.innerHTML += `<div class="log-line" style="color: ${color}">[${tiempo}] ${mensaje}</div>`;
            document.querySelector('.monitor').scrollTop = document.querySelector('.monitor').scrollHeight;
        }

        const firebaseConfig = {
            apiKey: "AIzaSyAzBa3rUUKQ6rlmtmbrqdZN3lWulBBbLG0",
            projectId: "night-sistema"
        };

        registrarLog("🚀 SISTEMA INICIADO: Corriendo en servidores seguros de GitHub.", "#00ff66");
        registrarLog(`🔗 Conectado de forma remota a Firebase: "${firebaseConfig.projectId}"`, "#a1a1aa");

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('correo-usuario').value;
            const password = document.getElementById('clave-usuario').value;

            registrarLog(`⚙️ Procesando credenciales del formulario...`, "#fff");
            registrarLog("📡 Abriendo canal seguro HTTPS hacia Google Identity Toolkit...", "#ffcc00");

            const url = `https://googleapis.com{firebaseConfig.apiKey}`;

            // Petición directa Fetch compatible con los servidores de GitHub y Safari
            fetch(url, {
                method: 'POST',
                body: JSON.stringify({ email: email, password: password, returnSecureToken: true }),
                headers: { 'Content-Type': 'application/json' }
            })
            .then(res => {
                registrarLog(`📥 Paquete recibido por Google. Código de Estado HTTP: ${res.status}`, "#00cfec");
                return res.json();
            })
            .then(data => {
                if (data.error) {
                    registrarLog(`❌ OPERACIÓN RECHAZADA POR EL SERVIDOR`, "#ff3333");
                    registrarLog(`Motivo exacto: <b>${data.error.message}</b>`, "#ff3333");
                    
                    if (data.error.message === "OPERATION_NOT_ALLOWED") {
                        registrarLog("🚨 ACCIÓN OBLIGATORIA: Entra a tu consola de Firebase > Authentication > pestaña Sign-in Method y activa el interruptor de 'Correo electrónico/Contraseña'.", "#ff3333");
                    }
                } else {
                    registrarLog(`🎉 ¡ÉXITO COMPLETO! El usuario se ha guardado en Firebase.`, "#00ff66");
                    registrarLog(`🆔 UID oficial asignado: ${data.localId}`, "#00ff66");
                    registrarLog(`📧 Correo registrado: ${data.email}`, "#00ff66");
                    form.reset();
                }
            })
            .catch(err => {
                registrarLog(`❌ ERROR CRÍTICO DE RED`, "#ff3333");
                registrarLog(`Fallo: ${err.message}`, "#ff3333");
            });
        });
    </script>
</body>
</html>
