<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Prueba de Motor JS</title>
    <style>
        body { background-color: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        .card { background-color: #1e293b; padding: 32px; border-radius: 16px; text-align: center; border: 1px solid #334155; }
        button { padding: 14px 28px; background-color: #10b981; color: #0f172a; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
        <h2>Control de Clic de Mac</h2>
        <br><br>
        <button type="button" onclick="probarBoton()">PRESIONAR AQUÍ</button>
    </div>

    <script>
        // Esta función se ejecuta inmediatamente sin consultar a internet ni a Supabase
        function probarBoton() {
            alert("¡EL JAVASCRIPT EN TU MAC SÍ FUNCIONA!");
        }
    </script>
</body>
</html>
