<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro 2NIGHT</title>
</head>
<body>
    <h2>Crear Cuenta Nueva (2NIGHT)</h2>
    <form id="registerForm">
        <input type="email" id="email" placeholder="Correo Electrónico" required><br><br>
        <input type="password" id="password" placeholder="Contraseña (mínimo 6 caracteres)" required><br><br>
        <button type="submit" id="btnRegistrar">Registrarme</button>
    </form>
    
    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const boton = document.getElementById('btnRegistrar');
            boton.innerText = "Registrando en 2NIGHT...";
            boton.disabled = true;

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Clave de API de tu proyecto integrada
            const apiKey = "AIzaSyBHPl53nlowROldN-IGbmECGYhz3lRz7Tc";
            
            // Endpoint nativo con https:// para evitar bloqueos en celulares
            const url = "https://googleapis.com" + apiKey;

            fetch(url, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ 
                    email: email, 
                    password: password, 
                    returnSecureToken: true 
                })
            })
            .then(function(response) {
                return response.json();
            })
            .then(function(data) {
                if (data.error) {
                    // Si el correo ya existe o la contraseña es muy corta, Firebase avisará aquí
                    alert("Firebase 2NIGHT denegó el registro: " + data.error.message);
                    boton.innerText = "Registrarme";
                    boton.disabled = false;
                } else {
                    alert("¡ÉXITO TOTAL! Tu usuario se guardó en el nuevo proyecto 2NIGHT.");
                    // Guarda el token en el navegador para mantener la sesión abierta
                    localStorage.setItem('userToken', data.idToken);
                    window.location.href = "perfil.html";
                }
            })
            .catch(function(error) {
                alert("Error de conexión con el servidor.");
                boton.innerText = "Registrarme";
                boton.disabled = false;
            });
        });
    </script>
</body>
</html>
