<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Autenticación Definitiva - Supabase</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: radial-gradient(circle at center, #1e1b4b 0%, #0f172a 100%); color: #f8fafc; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .card { background: rgba(30, 41, 59, 0.7); padding: 40px; border-radius: 24px; width: 100%; max-width: 400px; border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); backdrop-filter: blur(12px); text-align: center; }
        h2 { font-size: 26px; margin-bottom: 8px; color: #10b981; font-weight: 800; }
        p { font-size: 14px; color: #94a3b8; margin-bottom: 32px; }
        .form-group { margin-bottom: 24px; text-align: left; }
        label { display: block; margin-bottom: 8px; color: #94a3b8; font-size: 13px; font-weight: 600; text-transform: uppercase; }
        input { width: 100%; padding: 14px; border: 2px solid #334155; border-radius: 12px; background: rgba(15, 23, 42, 0.6); color: #fff; font-size: 16px; outline: none; }
        input:focus { border-color: #10b981; }
        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        button { width: 100%; padding: 16px; background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: #0f172a; border: none; border-radius: 12px; font-size: 16px; cursor: pointer; font-weight: 700; transition: all 0.2s ease; }
        button:disabled { background: #334155; color: #64748b; cursor: not-allowed; opacity: 0.6; }
        .btn-secondary { background: #334155; color: #fff; }
        .btn-secondary:hover { background: #475569; }
        .btn-danger { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); color: #fff; }
        .msg { margin-top: 24px; font-size: 14px; display: none; padding: 14px; border-radius: 12px; font-weight: 500; text-align: left; word-break: break-word; }
        .success { display: block; background: rgba(16, 185, 129, 0.12); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.25); }
        .error { display: block; background: rgba(239, 68, 68, 0.12); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.25); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- Panel de Autenticación (Login / Registro) -->
    <div class="card" id="authCard">
        <h2 id="cardTitle">Iniciar Sesión</h2>
        <p id="cardSubtitle">Ingresa tus credenciales para acceder</p>
        
        <form id="authForm">
            <div class="form-group">
                <label>Correo Electrónico</label>
                <input type="email" id="email" required placeholder="ejemplo@correo.com">
            </div>
            
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="password" required placeholder="Mínimo 6 caracteres">
            </div>
            
            <div class="btn-group">
                <button type="submit" id="btnPrimary">Ingresar</button>
                <button type="button" id="btnToggle" class="btn-secondary">¿No tienes cuenta? Regístrate</button>
            </div>
        </form>

        <div id="statusMessage" class="msg"></div>
    </div>

    <!-- Panel del Dashboard (Usuario Logueado) -->
    <div class="card hidden" id="dashboardCard">
        <h2>¡Bienvenido!</h2>
        <p>Has iniciado sesión correctamente.</p>
        <div class="form-group" style="text-align: center; margin-bottom: 32px;">
            <label>Usuario Activo</label>
            <span id="userEmail" style="font-size: 16px; color: #fff; font-weight: 600;"></span>
        </div>
        <button type="button" id="btnLogout" class="btn-danger">Cerrar Sesión</button>
    </div>

<script>
    const SUPABASE_URL = "https://kpxcpkzmquqyduadnahz.supabase.co";
    const SUPABASE_KEY = "sb_publishable_XMm1hlrSBzm8iyLWM1iqCA__qBE79B3";

    // Modos de la interfaz: 'login' o 'signup'
    let currentMode = 'login'; 
    // Token de acceso guardado en memoria tras el login
    let accessToken = null;

    const authCard = document.getElementById('authCard');
    const dashboardCard = document.getElementById('dashboardCard');
    const authForm = document.getElementById('authForm');
    const cardTitle = document.getElementById('cardTitle');
    const cardSubtitle = document.getElementById('cardSubtitle');
    const btnPrimary = document.getElementById('btnPrimary');
    const btnToggle = document.getElementById('btnToggle');
    const btnLogout = document.getElementById('btnLogout');
    const userEmailSpan = document.getElementById('userEmail');
    const msg = document.getElementById('statusMessage');

    // Cambiar de vista entre Login y Registro
    btnToggle.addEventListener('click', () => {
        msg.style.display = "none";
        if (currentMode === 'login') {
            currentMode = 'signup';
            cardTitle.textContent = "Registro Directo";
            cardSubtitle.textContent = "Los usuarios se guardarán en tu tabla de Auth";
            btnPrimary.textContent = "Registrar Cuenta";
            btnToggle.textContent = "¿Ya tienes cuenta? Inicia Sesión";
        } else {
            currentMode = 'login';
            cardTitle.textContent = "Iniciar Sesión";
            cardSubtitle.textContent = "Ingresa tus credenciales para acceder";
            btnPrimary.textContent = "Ingresar";
            btnToggle.textContent = "¿No tienes cuenta? Regístrate";
        }
    });

    // Procesar el envío del formulario único
    authForm.addEventListener('submit', async function(e) {
        e.preventDefault(); 
        
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        
        msg.style.display = "none"; 
        btnPrimary.disabled = true;
        btnPrimary.textContent = currentMode === 'login' ? "Verificando..." : "Guardando...";

        // Define la URL del endpoint según la acción requerida
        const endpoint = currentMode === 'login' ? '/auth/v1/token?grant_type=password' : '/auth/v1/signup';

        try {
            const response = await fetch(`${SUPABASE_URL}${endpoint}`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "apikey": SUPABASE_KEY,
                    "Authorization": `Bearer ${SUPABASE_KEY}`
                },
                body: JSON.stringify({ email, password })
            });

            const result = await response.json();

            if (!response.ok) {
                throw new Error(result.error_description || result.msg || result.message || "Error de autenticación");
            }

            if (currentMode === 'login') {
                // Login exitoso: Almacena el token y actualiza la UI al Dashboard
                accessToken = result.access_token;
                userEmailSpan.textContent = result.user.email;
                
                authCard.classList.add('hidden');
                dashboardCard.classList.remove('hidden');
                authForm.reset();
            } else {
                // Registro exitoso
                msg.innerHTML = "<strong>¡Usuario guardado con éxito!</strong><br>Ya puedes iniciar sesión con estos datos."; 
                msg.className = "msg success"; 
                msg.style.display = "block";
                authForm.reset();
            }

        } catch (err) {
            msg.innerHTML = `<strong>Error de Supabase:</strong><br>${err.message}`; 
            msg.className = "msg error"; 
            msg.style.display = "block"; 
        } finally {
            btnPrimary.disabled = false; 
            btnPrimary.textContent = currentMode === 'login' ? "Ingresar" : "Registrar Cuenta";
        }
    });

    // Procesar el Cierre de Sesión
    btnLogout.addEventListener('click', async () => {
        try {
            // Llama al endpoint de logout enviando el token del usuario activo
            await fetch(`${SUPABASE_URL}/auth/v1/logout`, {
                method: "POST",
                headers: {
                    "apikey": SUPABASE_KEY,
                    "Authorization": `Bearer ${accessToken}`
                }
            });
        } catch (err) {
            console.error("Error al revocar token en servidor:", err);
        } finally {
            // Limpieza de estados locales y retorno a la interfaz de login
            accessToken = null;
            currentMode = 'login';
            cardTitle.textContent = "Iniciar Sesión";
            cardSubtitle.textContent = "Ingresa tus credenciales para acceder";
            btnPrimary.textContent = "Ingresar";
            btnToggle.textContent = "¿No tienes cuenta? Regístrate";
            
            dashboardCard.classList.add('hidden');
            authCard.classList.remove('hidden');
        }
    });
</script>
</body>
</html>
