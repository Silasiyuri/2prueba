<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Registro Definitivo - Supabase</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: radial-gradient(circle at center, #1e1b4b 0%, #0f172a 100%); color: #f8fafc; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .card { background: rgba(30, 41, 59, 0.7); padding: 40px; border-radius: 24px; width: 100%; max-width: 400px; border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); backdrop-filter: blur(12px); text-align: center; }
        h2 { font-size: 26px; margin-bottom: 8px; color: #10b981; font-weight: 800; }
        p { font-size: 14px; color: #94a3b8; margin-bottom: 32px; }
        .form-group { margin-bottom: 24px; text-align: left; }
        label { display: block; margin-bottom: 8px; color: #94a3b8; font-size: 13px; font-weight: 600; text-transform: uppercase; }
        input { width: 100%; padding: 14px; border: 2px solid #334155; border-radius: 12px; background: rgba(15, 23, 42, 0.6); color: #fff; font-size: 16px; outline: none; }
        input:focus { border-color: #10b981; }
        button { width: 100%; padding: 16px; background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: #0f172a; border: none; border-radius: 12px; font-size: 16px; cursor: pointer; font-weight: 700; transition: all 0.2s ease; width: 100%; }
        button:disabled { background: #334155; color: #64748b; cursor: not-allowed; opacity: 0.6; }
        .msg { margin-top: 24px; font-size: 14px; display: none; padding: 14px; border-radius: 12px; font-weight: 500; text-align: left; word-break: break-word; }
        .success { display: block; background: rgba(16, 185, 129, 0.12); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.25); }
        .error { display: block; background: rgba(239, 68, 68, 0.12); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.25); }
    </style>
</head>
<body>

    <div class="card">
        <h2>Registro Directo</h2>
        <p>Los usuarios se guardarán en tu tabla de Auth</p>
        
        <form id="registerForm">
            <div class="form-group">
                <label>Correo Electrónico</label>
                <input type="email" id="email" required placeholder="ejemplo@correo.com">
            </div>
            
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="password" required placeholder="Mínimo 6 caracteres">
            </div>
            
            <button type="submit" id="btnSubmit">Registrar Cuenta</button>
        </form>

        <div id="statusMessage" class="msg"></div>
    </div>

<script>
    const SUPABASE_URL = "https://kpxcpkzmquqyduadnahz.supabase.co";
    const SUPABASE_KEY = "sb_publishable_XMm1hlrSBzm8iyLWM1iqCA__qBE79B3";

    const form = document.getElementById('registerForm');
    const btn = document.getElementById('btnSubmit');
    const msg = document.getElementById('statusMessage');

    form.addEventListener('submit', async function(e) {
        // CORRECCIÓN CRÍTICA: Detiene el envío clásico nativo para que la pantalla NO se quede en blanco
        e.preventDefault(); 
        
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        
        msg.style.display = "none"; 
        btn.disabled = true;
        btn.textContent = "Guardando en la nube...";

        try {
            const response = await fetch(`${SUPABASE_URL}/auth/v1/signup`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "apikey": SUPABASE_KEY,
                    "Authorization": `Bearer ${SUPABASE_KEY}`
                },
                body: JSON.stringify({ email, password })
            });

            const result = await response.json();

            if (!response.ok) {
                throw new Error(result.msg || result.message || "Error en el servidor");
            }

            // Éxito: Modifica la interfaz sin salir de la página
            btn.disabled = false; 
            btn.textContent = "Registrar Cuenta";
            form.reset();
            
            msg.innerHTML = "<strong>¡Usuario guardado con éxito!</strong><br>Ya puedes revisar tu panel web de Supabase para confirmar el registro."; 
            msg.className = "msg success"; 
            msg.style.display = "block";

        } catch (err) {
            btn.disabled = false; 
            btn.textContent = "Registrar Cuenta";
            
            // Si el correo ya existía en la base de datos o la contraseña es muy corta
            msg.innerHTML = `<strong>Error de Supabase:</strong><br>${err.message}`; 
            msg.className = "msg error"; 
            msg.style.display = "block"; 
        }
    });
</script>
</body>
</html>
