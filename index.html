<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Registro Seguro - Supabase</title>
    
    <!-- CDN de Supabase cargado correctamente -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background-color: #0f172a; color: #f8fafc; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background-color: #1e293b; padding: 32px; border-radius: 16px; width: 100%; max-width: 400px; border: 1px solid #334155; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3); }
        h2 { font-size: 22px; margin-bottom: 24px; color: #10b981; text-align: center; font-weight: 700; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #94a3b8; font-size: 14px; font-weight: 500; }
        .form-group input { width: 100%; padding: 12px 16px; border: 2px solid #334155; border-radius: 8px; background-color: #0f172a; color: #fff; font-size: 16px; outline: none; transition: border-color 0.2s; }
        .form-group input:focus { border-color: #10b981; }
        button { width: 100%; padding: 14px; background-color: #10b981; color: #0f172a; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; transition: background-color 0.2s; }
        button:hover { background-color: #059669; }
        button:disabled { background-color: #334155; color: #94a3b8; cursor: not-allowed; }
        .msg { margin-top: 20px; font-size: 14px; text-align: center; display: none; padding: 12px; border-radius: 8px; font-weight: 500; }
        .success { display: block; background-color: rgba(16, 185, 129, 0.15); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.3); }
        .error { display: block; background-color: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); }
    </style>
</head>
<body>

    <div class="card">
        <h2>Registro en la Nube</h2>
        
        <form id="registerForm">
            <div class="form-group">
                <label>Correo Electrónico</label>
                <input type="email" id="email" required placeholder="ejemplo@correo.com">
            </div>
            
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="password" required placeholder="Mínimo 6 caracteres">
            </div>
            
            <button type="submit" id="btnSubmit">Crear Cuenta</button>
        </form>

        <div id="statusMessage" class="msg"></div>
    </div>

    <script>
        // CORRECCIÓN CLAVE: Desestructurar la función global de la CDN
        const { createClient } = supabase;

        const SUPABASE_URL = "https://sxccozwujfinramrczql.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_R0Cjm2izOTXxcgF-m5METQ_EOahA7iyesta";

        // Inicialización nativa del cliente
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const form = document.getElementById('registerForm');
        const statusMessage = document.getElementById('statusMessage');
        const button = document.getElementById('btnSubmit');

        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            statusMessage.style.display = "none";
            statusMessage.className = "msg";
            button.disabled = true;
            button.textContent = "Procesando registro...";

            try {
                const { data, error } = await supabaseClient.auth.signUp({
                    email: email,
                    password: password,
                });

                button.disabled = false;
                button.textContent = "Crear Cuenta";

                if (error) {
                    statusMessage.textContent = "Error de Supabase: " + error.message;
                    statusMessage.className = "msg error";
                    console.error("Detalle del Error:", error);
                } else {
                    statusMessage.textContent = "¡Registro exitoso! Usuario creado en la base de datos.";
                    statusMessage.className = "msg success";
                    form.reset();
                }
            } catch (err) {
                button.disabled = false;
                button.textContent = "Crear Cuenta";
                statusMessage.textContent = "Error técnico de ejecución local.";
                statusMessage.className = "msg error";
                console.error("Excepción:", err);
            }
        });
    </script>
</body>
</html>
