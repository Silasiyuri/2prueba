<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Oficial 2NIGHT</title>
</head>
<body>
    <h2>Crear Cuenta Nueva (2NIGHT)</h2>
    <form id="registerForm">
        <input type="email" id="email" placeholder="Correo Electrónico" required><br><br>
        <input type="password" id="password" placeholder="Contraseña (mínimo 6 caracteres)" required><br><br>
        <button type="submit" id="btnRegistrar">Registrarme</button>
    </form>
    
    <script type="module">
        // Uso mandatorio de módulos v10 para romper el bloqueo de Identity Platform
        import { initializeApp } from "https://gstatic.com";
        import { getAuth, createUserWithEmailAndPassword } from "https://gstatic.com";

        const firebaseConfig = {
          apiKey: "AIzaSyBHPl53nlowROldN-IGbmECGYhz3lRz7Tc",
          authDomain: "://firebaseapp.com",
          projectId: "night-f23fa"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const boton = document.getElementById('btnRegistrar');
            boton.innerText = "Registrando en 2NIGHT...";
            boton.disabled = true;

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            createUserWithEmailAndPassword(auth, email, password)
                .then(function(userCredential) {
                    alert("¡ÉXITO TOTAL! El usuario se guardó en tu panel de 2NIGHT.");
                    window.location.href = "perfil.html";
                })
                .catch(function(error) {
                    boton.innerText = "Registrarme";
                    boton.disabled = false;
                    // Alerta que te dirá si el correo está repetido o mal escrito
                    alert("Respuesta de Firebase: " + error.message);
                });
        });
    </script>
</body>
</html>
