<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro 2NIGHT</title>
</head>
<body>
    <h2>Crear Cuenta Nueva (2NIGHT)</h2>
    <form id="registerForm">
        <input type="email" id="email" placeholder="Correo Electrónico" required><br><br>
        <input type="password" id="password" placeholder="Contraseña (mínimo 6 caracteres)" required><br><br>
        <button type="submit" id="btnRegistrar">Registrarme</button>
    </form>
    
    <script type="module">
        // IMPORTANTE: Módulos oficiales v10 obligatorios para proyectos con Identity Platform activa
        import { initializeApp } from "https://gstatic.com";
        import { getAuth, createUserWithEmailAndPassword } from "https://gstatic.com";

        // Credenciales reales vinculadas a tu cuenta de servicio de 2NIGHT
        const firebaseConfig = {
          apiKey: "AIzaSyBHPl53nlowROldN-IGbmECGYhz3lRz7Tc",
          authDomain: "://firebaseapp.com",
          projectId: "night-f23fa"
        };

        // Inicialización segura del SDK
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const boton = document.getElementById('btnRegistrar');
            boton.innerText = "Conectando con 2NIGHT...";
            boton.disabled = true;

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Petición de registro a través del SDK Modular
            createUserWithEmailAndPassword(auth, email, password)
                .then(function(userCredential) {
                    alert("¡ÉXITO TOTAL! Tu usuario se ha registrado en el proyecto 2NIGHT.");
                    // Guarda el token en el navegador antes de redirigir
                    localStorage.setItem('userToken', userCredential.user.accessToken);
                    window.location.href = "perfil.html";
                })
                .catch(function(error) {
                    boton.innerText = "Registrarme";
                    boton.disabled = false;
                    
                    // Alerta que te dirá el error exacto en pantalla si falta un permiso en tu consola
                    alert("Firebase 2NIGHT respondió: " + error.message);
                    console.error(error);
                });
        });
    </script>
</body>
</html>
