<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Seguro - Supabase</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background-color: #0f172a; color: #f8fafc; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background-color: #1e293b; padding: 32px; border-radius: 16px; width: 100%; max-width: 400px; border: 1px solid #334155; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3); }
        h2 { font-size: 22px; margin-bottom: 24px; color: #10b981; text-align: center; font-weight: 700; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #94a3b8; font-size: 14px; font-weight: 500; }
        .form-group input { width: 100%; padding: 12px 16px; border: 2px solid #334155; border-radius: 8px; background-color: #0f172a; color: #fff; font-size: 16px; outline: none; transition: border-color 0.2s; }
        .form-group input:focus { border-color: #10b981; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        button { flex: 1; padding: 14px; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; font-weight: bold; transition: background-color 0.2s; }
        .btn-primary { background-color: #10b981; color: #0f172a; }
        .btn-primary:hover { background-color: #059669; }
        .btn-secondary { background-color: #334155; color: #f8fafc; }
        .btn-secondary:hover { background-color: #475569; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .msg { margin-top: 20px; font-size: 14px; text-align: center; display: block; padding: 12px; border-radius: 8px; font-weight: 500; white-space: pre-wrap; word-break: break-word; }
        .hidden { display: none !important; }
        .success { background-color: rgba(16, 185, 129, 0.15); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.3); }
        .error { background-color: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); }
    </style>
</head>
<body>

    <div class="card">
        <h2>Ingreso a la Nube</h2>
        
        <form id="authForm">
            <div class="form-group">
                <label>Correo Electrónico</label>
                <input type="email" id="email" required placeholder="ejemplo@correo.com">
            </div>
            
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="password" required minlength="6" placeholder="Mínimo 6 caracteres">
            </div>
            
            <div class="btn-group">
                <button type="submit" id="btnLogin" class="btn-primary" name="action" value="login">Iniciar Sesión</button>
                <button type="submit" id="btnRegister" class="btn-secondary" name="action" value="signup">Registrarse</button>
            </div>
        </form>

        <div id="statusMessage" class="msg hidden"></div>
    </div>

    <!-- Forzamos la carga modular nativa autorizada por los navegadores modernos de Mac -->
    <script type="module">
        import { createClient } from 'https://jsdelivr.net';

        const SUPABASE_URL = "https://sxccozwujfinramrczql.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_R0Cjm2izOTXxcgF-m5METQ_EOahA7iyesta";

        // Inicializamos la SDK nativa con persistencia local desactivada para evitar bloqueos del sistema de cookies de Mac
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            auth: {
                persistSession: false,
                autoRefreshToken: false
            }
        });

        const form = document.getElementById('authForm');
        const statusMessage = document.getElementById('statusMessage');
        const btnLogin = document.getElementById('btnLogin');
        const btnRegister = document.getElementById('btnRegister');

        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            const botonPresionado = document.activeElement ? document.activeElement.value : 'login';
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            statusMessage.className = "msg hidden";
            btnLogin.disabled = true;
            btnRegister.disabled = true;

            try {
                let respuesta;
                
                if (botonPresionado === 'signup') {
                    // Acción de Registro Oficial
                    respuesta = await supabaseClient.auth.signUp({ email, password });
                } else {
                    // Acción de Login Oficial
                    respuesta = await supabaseClient.auth.signInWithPassword({ email, password });
                }

                const { data, error } = respuesta;

                btnLogin.disabled = false;
                btnRegister.disabled = false;
                statusMessage.classList.remove('hidden');

                if (error) {
                    statusMessage.textContent = "Error de Supabase: " + error.message;
                    statusMessage.className = "msg error";
                } else if (data) {
                    if (botonPresionado === 'signup') {
                        statusMessage.textContent = "¡Registro Exitoso!\nUsuario enviado de forma segura a Supabase.";
                    } else {
                        statusMessage.textContent = "¡Login Correcto!\nConexión establecida con éxito.";
                    }
                    statusMessage.className = "msg success";
                    form.reset();
                }
            } catch (err) {
                btnLogin.disabled = false;
                btnRegister.disabled = false;
                statusMessage.classList.remove('hidden');
                statusMessage.textContent = "Excepción de Red Local: " + err.message;
                statusMessage.className = "msg error";
            }
        });
    </script>
</body>
</html>
