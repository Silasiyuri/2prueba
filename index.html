<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Super Login - Supabase</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background: radial-gradient(circle at center, #1e1b4b 0%, #0f172a 100%); color: #f8fafc; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: rgba(30, 41, 59, 0.7); padding: 40px; border-radius: 24px; width: 100%; max-width: 400px; border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); backdrop-filter: blur(12px); text-align: center; }
        h2 { font-size: 26px; margin-bottom: 8px; color: #10b981; font-weight: 800; }
        p { font-size: 14px; color: #94a3b8; margin-bottom: 32px; }
        .form-group { margin-bottom: 24px; text-align: left; }
        label { display: block; margin-bottom: 8px; color: #94a3b8; font-size: 13px; font-weight: 600; text-transform: uppercase; }
        input { width: 100%; padding: 14px; border: 2px solid #334155; border-radius: 12px; background: rgba(15, 23, 42, 0.6); color: #fff; font-size: 16px; outline: none; }
        input:focus { border-color: #10b981; }
        button { width: 100%; padding: 16px; background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: #0f172a; border: none; border-radius: 12px; font-size: 16px; cursor: pointer; font-weight: 700; }
        button:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
        .msg { margin-top: 24px; font-size: 14px; display: none; padding: 14px; border-radius: 12px; font-weight: 500; text-align: left; word-break: break-word; }
        .success { display: block; background: rgba(16, 185, 129, 0.12); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.25); }
        .error { display: block; background: rgba(239, 68, 68, 0.12); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.25); }
        .toggle-container { margin-top: 24px; font-size: 14px; color: #94a3b8; }
        .toggle-link { color: #10b981; font-weight: 600; cursor: pointer; margin-left: 4px; }
        .avatar { width: 64px; height: 64px; background: rgba(16, 185, 129, 0.1); border: 2px solid #10b981; border-radius: 50%; display: flex; justify-content: center; align-items: center; margin: 0 auto 20px auto; color: #10b981; font-size: 28px; font-weight: bold; }
        .logout-btn { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); color: #fff; }
    </style>
</head>
<body>
    <div class="card" id="authCard">
        <h2 id="formTitle">Iniciar Sesión</h2>
        <p id="formSubtitle">Ingresa tus credenciales para continuar</p>
        <form id="authForm">
            <div class="form-group"><label>Correo Electrónico</label><input type="email" id="email" required placeholder="tu@correo.com"></div>
            <div class="form-group"><label>Contraseña</label><input type="password" id="password" required placeholder="••••••••"></div>
            <button type="submit" id="btnSubmit">Entrar al Sistema</button>
        </form>
        <div id="statusMessage" class="msg"></div>
        <div class="toggle-container" id="toggleContainer"><span id="toggleText">¿Eres nuevo aquí?</span><span class="toggle-link" id="toggleLink">Crea una cuenta</span></div>
    </div>
<script>
    const P_URL = "https://supabase.co", P_KEY = "sb_publishable_XMm1hlrSBzm8iyLWM1iqCA__qBE79B3";
    let client = supabase.createClient(P_URL, P_KEY);
    const card = document.getElementById('authCard'), form = document.getElementById('authForm'), title = document.getElementById('formTitle'), sub = document.getElementById('formSubtitle'), btn = document.getElementById('btnSubmit'), msg = document.getElementById('statusMessage'), tText = document.getElementById('toggleText'), tLink = document.getElementById('toggleLink');
    let mode = 'login';
    tLink.addEventListener('click', () => {
        msg.style.display = "none"; form.reset();
        if (mode === 'login') {
            mode = 'signup'; title.textContent = "Registro Seguro"; sub.textContent = "Crea un perfil inmediato"; btn.textContent = "Registrar Cuenta"; tText.textContent = "¿Ya tienes usuario?"; tLink.textContent = "Inicia sesión";
        } else {
            mode = 'login'; title.textContent = "Iniciar Sesión"; sub.textContent = "Ingresa tus credenciales"; btn.textContent = "Entrar al Sistema"; tText.textContent = "¿Eres nuevo aquí?"; tLink.textContent = "Crea una cuenta";
        }
    });
    form.addEventListener('submit', async function(e) {
        e.preventDefault(); const email = document.getElementById('email').value.trim(), pass = document.getElementById('password').value;
        msg.style.display = "none"; btn.disabled = true;
        const oText = mode === 'login' ? "Entrar al Sistema" : "Registrar Cuenta";
        btn.textContent = mode === 'login' ? "Verificando..." : "Registrando...";
        const rescue = setTimeout(() => {
            if (btn.disabled) { btn.disabled = false; btn.textContent = oText; showErr("Tiempo de espera agotado. Usa Live Server."); }
        }, 5000);
        try {
            if (mode === 'login') {
                const { data, error } = await client.auth.signInWithPassword({ email, password: pass });
                clearTimeout(rescue); if (error) throw error;
                msg.textContent = "¡Acceso verificado! Entrando..."; msg.className = "msg success"; msg.style.display = "block";
                setTimeout(checkSession, 600);
            } else {
                const { data, error } = await client.auth.signUp({ email, password: pass });
                clearTimeout(rescue); if (error) throw error;
                btn.disabled = false; btn.textContent = oText;
                if (data.session) {
                    msg.textContent = "¡Cuenta creada! Entrando..."; msg.className = "msg success"; msg.style.display = "block";
                    setTimeout(checkSession, 600);
                } else {
                    tLink.click(); msg.textContent = "¡Cuenta creada! Revisa tu Email para verificar tu cuenta."; msg.className = "msg success"; msg.style.display = "block";
                }
            }
        } catch (err) {
            clearTimeout(rescue); btn.disabled = false; btn.textContent = oText;
            showErr(err.message.includes("weak_password") ? "Contraseña muy débil (mínimo 6 caracteres)." : err.message);
        }
    });
    function showErr(text) { msg.innerHTML = `<strong>Error:</strong><br>${text}`; msg.className = "msg error"; msg.style.display = "block"; }
    async function checkSession() {
        const { data: { session } } = await client.auth.getSession();
        if (session) {
            const email = session.user.email;
            card.innerHTML = `<div class="welcome-panel"><div class="avatar">${email.charAt(0).toUpperCase()}</div><h2>¡Bienvenido!</h2><p>Sesión activa:<br><span style="color:#10b981;font-weight:600">${email}</span></p><button class="logout-btn" id="btnLogout">Cerrar Sesión</button></div>`;
            document.getElementById('btnLogout').addEventListener('click', async () => { await client.auth.signOut(); window.location.reload(); });
        }
    }
    window.addEventListener('DOMContentLoaded', checkSession);
</script>
</body>
</html>
