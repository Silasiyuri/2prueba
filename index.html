<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión</title>
</head>
<body>
    <h2>Iniciar Sesión</h2>
    <form id="loginForm">
        <input type="email" id="email" placeholder="Correo" required><br><br>
        <input type="password" id="password" placeholder="Contraseña" required><br><br>
        <button type="submit">Entrar</button>
    </form>
    <br>
    <p>¿No tienes cuenta? <a href="perfil.html">Regístrate aquí</a></p>

    <script type="module">
        // URLs oficiales y completas corregidas
        import { initializeApp } from "https://gstatic.com";
        import { getAuth, signInWithEmailAndPassword } from "https://gstatic.com";

        const firebaseConfig = {
          apiKey: "AIzaSyBHPl53nlowROldN-IGbmECGYhz3lRz7Tc",
          authDomain: "night-f23fa.firebaseapp.com",
          projectId: "night-f23fa",
          storageBucket: "night-f23fa.firebasestorage.app",
          messagingSenderId: "386862893155",
          appId: "1:386862893155:web:a42673375ea87209389056",
          measurementId: "G-ZSF58H9VE4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    alert("¡Bienvenido de nuevo!");
                    window.location.href = "perfil.html"; 
                })
                .catch((error) => {
                    let mensajeError = "Error al iniciar sesión.";
                    if (error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password' || error.code === 'auth/user-not-found') {
                        mensajeError = "El correo o la contraseña son incorrectos.";
                    }
                    alert(mensajeError);
                    console.error("Detalle del error:", error.message);
                });
        });
    </script>
</body>
</html>
