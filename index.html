<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Oficial 2NIGHT</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; min-height: 80vh; }
        .container { max-width: 350px; width: 100%; padding: 25px; background: white; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; margin-bottom: 20px; color: #111; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }
        .alert-box { margin-top: 15px; padding: 12px; font-size: 14px; border-radius: 4px; display: none; text-align: center; font-weight: 500; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .user-email { font-weight: bold; color: #007bff; }
        .btn-logout { background-color: #dc3545; color: white; border: none; padding: 12px; width: 100%; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 10px;}
        .btn-logout:hover { background-color: #c82333; }
    </style>
</head>
<body>

<!-- VISTA 1: Formulario de Registro -->
<div class="container" id="vistaRegistro">
    <h2>Crear Cuenta (2NIGHT)</h2>
    <form id="registerForm">
        <input type="email" id="email" placeholder="Correo Electrónico" required>
        <input type="password" id="password" placeholder="Contraseña (mínimo 6 caracteres)" required>
        <button type="submit" id="btnRegistrar">Registrarme</button>
    </form>
    <div id="statusMessage" class="alert-box"></div>
</div>

<!-- VISTA 2: Panel de Perfil -->
<div class="container" id="vistaPerfil" style="display: none; text-align: center;">
    <h2>¡Bienvenido a 2NIGHT!</h2>
    <p>Has ingresado correctamente a tu panel oficial.</p>
    <p>Tu usuario es: <span id="userEmail" class="user-email">Cargando...</span></p>
    <button class="btn-logout" id="btnCerrarSesion">Cerrar Sesión</button>
</div>

<!-- Scripts Modulares oficiales usando ESM -->
<script type="module">
    import { initializeApp } from "https://gstatic.com";
    import { getAuth, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://gstatic.com";

    // Tu configuración oficial compartida
    const firebaseConfig = {
      apiKey: "AIzaSyCpgq6V2u0_SUry-XNcoTBd-3GzKpho2BM",
      authDomain: "://firebaseapp.com",
      projectId: "night-oficial",
      storageBucket: "night-oficial.firebasestorage.app",
      messagingSenderId: "1058509818023",
      appId: "1:1058509818023:web:98bdad36b5685a220b3382"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Guardián de estado de sesión
    onAuthStateChanged(auth, (user) => {
        const vistaRegistro = document.getElementById('vistaRegistro');
        const vistaPerfil = document.getElementById('vistaPerfil');
        
        if (user) {
            document.getElementById('userEmail').innerText = user.email;
            vistaRegistro.style.display = 'none';
            vistaPerfil.style.display = 'block';
        } else {
            vistaRegistro.style.display = 'block';
            vistaPerfil.style.display = 'none';
        }
    });

    // Envío del Formulario
    document.getElementById('registerForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const boton = document.getElementById('btnRegistrar');
        const statusBox = document.getElementById('statusMessage');
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        boton.innerText = "Registrando en 2NIGHT...";
        boton.disabled = true;
        statusBox.style.display = "none";

        createUserWithEmailAndPassword(auth, email, password)
            .then((userCredential) => {
                mostrarAlerta(statusBox, "¡ÉXITO! Registrado en tu panel night-oficial.", "success");
            })
            .catch((error) => {
                console.error("Detalle del error:", error);
                let mensajeError = error.message; 
                
                if (error.code === 'auth/email-already-in-use') {
                    mensajeError = "Este correo ya está registrado.";
                } else if (error.code === 'auth/weak-password') {
                    mensajeError = "La contraseña debe tener mínimo 6 caracteres.";
                } else if (error.code === 'auth/operation-not-allowed') {
                    mensajeError = "Activa el proveedor 'Correo electrónico/Contraseña' en Firebase.";
                }

                mostrarAlerta(statusBox, mensajeError, "error");
                boton.innerText = "Registrarme";
                boton.disabled = false;
            });
    });

    // Cerrar Sesión
    document.getElementById('btnCerrarSesion').addEventListener('click', function() {
        signOut(auth).catch((error) => console.error(error));
    });

    function mostrarAlerta(elemento, mensaje, clase) {
        elemento.innerText = mensaje;
        elemento.className = "alert-box " + clase;
        elemento.style.display = "block";
    }
</script>


    
</body>
</html>
