<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuarios</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background-color: #121214; color: #ffffff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background-color: #202024; padding: 30px; border-radius: 12px; width: 100%; max-width: 380px; border: 1px solid #29292e; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { font-size: 20px; margin-bottom: 20px; color: #00cfec; text-align: center; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 6px; color: #a8a8b3; font-size: 13px; }
        .form-group input { width: 100%; padding: 12px 14px; border: 2px solid #29292e; border-radius: 8px; background-color: #121214; color: #fff; font-size: 16px; outline: none; }
        .form-group input:focus { border-color: #00cfec; }
        button { width: 100%; padding: 14px; background-color: #00cfec; color: #121214; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #0099bc; }
    </style>

    <!-- Cargamos las librerías oficiales desde el CDN estable de Cloudflare -->
    <script src="https://cloudflare.com"></script>
    <script src="https://cloudflare.com"></script>
</head>
<body>

    <div class="card">
        <h2>Crear Cuenta</h2>
        <form id="registro-form">
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" required placeholder="nombre@correo.com">
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" required placeholder="Mínimo 6 caracteres">
            </div>
            <button type="submit">Registrarse</button>
        </form>
    </div>

    <script>
        // Configuración oficial completa de tu app 'night-sistema'
        const firebaseConfig = {
            apiKey: "AIzaSyAzBa3rUUKQ6rlmtmbrqdZN3lWulBBbLG0",
            authDomain: "://firebaseapp.com",
            projectId: "night-sistema",
            storageBucket: "night-sistema.firebasestorage.app",
            messagingSenderId: "807108186238",
            appId: "1:807108186238:web:d36ee74cf0e2e095e3c82f"
        };

        // Inicialización nativa directa sin alertas de pre-carga
        if (typeof firebase !== 'undefined') {
            firebase.initializeApp(firebaseConfig);
        }

        document.getElementById('registro-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Transmisión directa hacia las bases de datos de Firebase
            firebase.auth().createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    alert("🎉 ¡REGISTRO EXITOSO!\n\nUsuario guardado de forma permanente en la nube.");
                    document.getElementById('registro-form').reset();
                })
                .catch((error) => {
                    // Si Google rechaza los datos, una alerta te dirá el código de respuesta real
                    alert("Respuesta del Servidor:\n\nCódigo: " + error.code + "\nMensaje: " + error.message);
                });
        });
    </script>
</body>
</html>
