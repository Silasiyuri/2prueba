<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Oficial 2NIGHT</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }
        form {
            max-width: 300px;
        }
        input {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:disabled {
            background-color: #cccccc;
        }
    </style>
</head>
<body>

    <h2>Crear Cuenta Nueva (2NIGHT)</h2>
    <form id="registerForm">
        <input type="email" id="email" placeholder="Correo Electrónico" required><br>
        <input type="password" id="password" placeholder="Contraseña (mínimo 6 caracteres)" required><br>
        <button type="submit" id="btnRegistrar">Registrarme</button>
    </form>
    
    <!-- LIBRERÍAS DE COMPATIBILIDAD: Cargan los servicios de Firebase de forma tradicional y directa sin usar "import" -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <script>
        // Configuración oficial obtenida de tu nuevo proyecto "night-oficial"
        const firebaseConfig = {
          apiKey: "AIzaSyCpgq6V2u0_SUry-XNcoTBd-3GzKpho2BM",
          authDomain: "night-oficial.firebaseapp.com",
          projectId: "night-oficial",
          storageBucket: "night-oficial.firebasestorage.app",
          messagingSenderId: "1058509818023",
          appId: "1:1058509818023:web:98bdad36b5685a220b3382"
        };

        // Inicializar Firebase Clásico
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // Controlar el evento de envío del formulario
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const boton = document.getElementById('btnRegistrar');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Bloquear interfaz para mitigar registros duplicados
            boton.innerText = "Registrando en 2NIGHT...";
            boton.disabled = true;

            // Petición directa al servidor para guardar el usuario
            auth.createUserWithEmailAndPassword(email, password)
                .then(function(userCredential) {
                    alert("¡ÉXITO TOTAL! El usuario se guardó en tu panel de 2NIGHT.");
                    window.location.href = "perfil.html";
                })
                .catch(function(error) {
                    // Si ocurre un error, devolvemos el botón a su estado normal
                    boton.innerText = "Registrarme";
                    boton.disabled = false;
                    
                    // Alerta con el mensaje descriptivo exacto
                    alert("Mensaje del Servidor: " + error.message);
                    console.error("Código de error de Firebase:", error.code);
                });
        });
    </script>

</body>
</html>
