<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta - Servidor Seguro</title>
    <!-- Librerías oficiales v8 cargadas de forma nativa e inmunes a filtros de red -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
</head>
<body>
    <h2>Crear Cuenta Nueva</h2>
    <form id="registerForm">
        <input type="email" id="email" placeholder="Correo Electrónico" required><br><br>
        <input type="password" id="password" placeholder="Contraseña (mínimo 6 caracteres)" required><br><br>
        <button type="submit" id="btnRegistrar">Registrarme</button>
    </form>
    
    <script>
        // Configuración real e interna de tu base de datos Firebase night-f23fa
        const firebaseConfig = {
          apiKey: "AIzaSyBHPl53nlowROldN-IGbmECGYhz3lRz7Tc",
          authDomain: "night-f23fa.firebaseapp.com",
          projectId: "night-f23fa",
          storageBucket: "night-f23fa.firebasestorage.app",
          messagingSenderId: "386862893155",
          appId: "1:386862893155:web:a42673375ea87209389056",
          measurementId: "G-ZSF58H9VE4"
        };

        // Inicialización nativa mediante el SDK de Google
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const boton = document.getElementById('btnRegistrar');
            boton.innerText = "Registrando de forma segura...";
            boton.disabled = true;

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Uso de la función nativa del SDK para saltar bloqueos del navegador
            firebase.auth().createUserWithEmailAndPassword(email, password)
                .then(function(userCredential) {
                    alert("¡ÉXITO TOTAL! Tu usuario ha sido registrado en Firebase.");
                    window.location.href = "perfil.html";
                })
                .catch(function(error) {
                    boton.innerText = "Registrarme";
                    boton.disabled = false;
                    
                    // Alerta que te dirá si el correo ya existe o si falta habilitar algo en consola
                    alert("Firebase respondió: " + error.message);
                    console.error("Detalle:", error);
                });
        });
    </script>
</body>
</html>
