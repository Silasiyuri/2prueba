<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registrarse</title>
</head>
<body>
    <h2>Crear Cuenta Nueva</h2>
    <form id="registerForm">
        <input type="email" id="email" placeholder="Correo Electrónico" required><br><br>
        <input type="password" id="password" placeholder="Contraseña (mínimo 6 caracteres)" required><br><br>
        <button type="submit">Registrarme</button>
    </form>
    <br>
    <p>¿Ya tienes cuenta? <a href="perfil.html">Inicia sesión aquí</a></p>

    <script type="module">
        import { initializeApp } from "https://gstatic.com";
        import { getAuth, createUserWithEmailAndPassword } from "https://gstatic.com";

        const firebaseConfig = {
          apiKey: "AIzaSyBHPl53nlowROldN-IGbmECGYhz3lRz7Tc",
          authDomain: "://firebaseapp.com",
          projectId: "night-f23fa",
          storageBucket: "night-f23fa.firebasestorage.app",
          messagingSenderId: "386862893155",
          appId: "1:386862893155:web:a42673375ea87209389056",
          measurementId: "G-ZSF58H9VE4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('registerForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Crear usuario en Firebase
            createUserWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    alert("¡Cuenta creada con éxito! Redirigiendo a tu perfil...");
                    window.location.href = "perfil.html";
                })
                .catch((error) => {
                    let mensajeError = "Error al registrar usuario.";
                    if (error.code === 'auth/email-already-in-use') {
                        mensajeError = "Este correo electrónico ya está registrado.";
                    } else if (error.code === 'auth/weak-password') {
                        mensajeError = "La contraseña debe tener al menos 6 caracteres.";
                    } else if (error.code === 'auth/invalid-email') {
                        mensajeError = "El formato del correo electrónico no es válido.";
                    }
                    alert(mensajeError);
                    console.error("Detalle:", error.message);
                });
        });
    </script>
</body>
</html>
