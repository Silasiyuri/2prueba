<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro 2NIGHT</title>
</head>
<body>
    <h2>Crear Cuenta Nueva (2NIGHT)</h2>
    <form id="registerForm">
        <input type="email" id="email" placeholder="Correo Electrónico" required><br><br>
        <input type="password" id="password" placeholder="Contraseña (mínimo 6 caracteres)" required><br><br>
        <button type="submit" id="btnRegistrar">Registrarme</button>
    </form>
    
    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const boton = document.getElementById('btnRegistrar');
            boton.innerText = "Registrando en 2NIGHT...";
            boton.disabled = true;

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Clave de API e endpoint ajustados específicamente para el nuevo servidor de 2NIGHT
            const apiKey = "AIzaSyBHPl53nlowROldN-IGbmECGYhz3lRz7Tc";
            const url = "https://googleapis.com" + apiKey;

            fetch(url, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ 
                    email: email, 
                    password: password, 
                    returnSecureToken: true 
                })
            })
            .then(function(response) {
                return response.json();
            })
            .then(function(data) {
                if (data.error) {
                    // Mensaje de diagnóstico directo del nuevo proyecto
                    alert("Firebase 2NIGHT respondió: " + data.error.message);
                    boton.innerText = "Registrarme";
                    boton.disabled = false;
                } else {
                    alert("¡ÉXITO TOTAL! El usuario se ha guardado en el proyecto 2NIGHT.");
                    window.location.href = "perfil.html";
                }
            })
            .catch(function(error) {
                alert("Error técnico de red: " + error.message);
                boton.innerText = "Registrarme";
                boton.disabled = false;
            });
        });
    </script>
</body>
</html>
