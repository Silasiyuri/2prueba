<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Oficial - 2NIGHT</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f4f9; display: flex; align-items: center; justify-content: center; min-height: 80vh; }
        .container { max-width: 360px; width: 100%; padding: 25px; background: white; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; margin-bottom: 20px; color: #111; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        button { width: 100%; padding: 12px; background-color: #27ae60; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }
        .alert-box { margin-top: 15px; padding: 12px; font-size: 14px; border-radius: 4px; display: none; text-align: center; font-weight: bold; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; text-align: left; font-family: monospace; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="container">
    <h2>Crear Cuenta (2NIGHT)</h2>
    <form id="registerForm">
        <input type="email" id="email" placeholder="Correo Electrónico" required>
        <input type="password" id="password" placeholder="Contraseña (mínimo 6 caracteres)" required>
        <button type="submit" id="btnRegistrar">Registrarme Ahora</button>
    </form>
    <div id="statusMessage" class="alert-box"></div>
</div>

<script>
    document.getElementById('registerForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        var boton = document.getElementById('btnRegistrar');
        var statusBox = document.getElementById('statusMessage');
        var email = document.getElementById('email').value.trim();
        var password = document.getElementById('password').value;

        boton.innerText = "CONECTANDO CON SERVIDORES...";
        boton.disabled = true;
        statusBox.style.display = "none";

        // Canal de comunicación directo con tu nueva API Key limpia de night-sistema
        var urlApi = "https://googleapis.com" + "AIzaSyAzBa3rUUKQ6rlmtmbrqdZN3lWulBBbLG0";

        var datosEnvio = {
            email: email,
            password: password,
            returnSecureToken: true
        };

        // Petición nativa Fetch estable
        fetch(urlApi, {
            method: 'POST',
            body: JSON.stringify(datosEnvio),
            headers: { 'Content-Type': 'application/json' }
        })
        .then(function(respuesta) {
            return respuesta.json().then(function(datos) {
                if (respuesta.ok) {
                    statusBox.innerText = "¡ÉXITO REAL TOTAL!\nUsuario guardado correctamente en tu proyecto night-sistema.";
                    statusBox.className = "alert-box success";
                    statusBox.style.display = "block";
                } else {
                    var motivo = datos.error ? datos.error.message : "Desconocido";
                    
                    // Traducción de las respuestas del servidor de Google
                    if (motivo === "EMAIL_EXISTS") { motivo = "Este correo ya está registrado."; }
                    if (motivo === "WEAK_PASSWORD") { motivo = "La contraseña debe tener mínimo 6 letras."; }
                    if (motivo === "OPERATION_NOT_ALLOWED") { motivo = "Error: Olvidaste habilitar Correo/Contraseña en el panel de night-sistema."; }
                    
                    statusBox.innerText = "AVISO DEL SERVIDOR:\n" + motivo;
                    statusBox.className = "alert-box error";
                    statusBox.style.display = "block";
                }
                boton.innerText = "Registrarme Ahora";
                boton.disabled = false;
            });
        })
        .catch(function(error) {
            console.error(error);
            statusBox.innerText = "ERROR DE SISTEMA:\nHubo un problema con la salida de datos de red.";
            statusBox.className = "alert-box error";
            statusBox.style.display = "block";
            boton.innerText = "Registrarme Ahora";
            boton.disabled = false;
        });
    });
</script>

</body>
</html>
